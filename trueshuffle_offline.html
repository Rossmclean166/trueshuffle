<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="True Shuffle">
<title>True Shuffle</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root { --green: #1DB954; --green-dark: #17a349; --bg: #080808; --surface: #141414; --surface2: #1c1c1c; --border: #262626; --text: #ffffff; --muted: #777; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
  #app { height: 100%; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

  /* TOP BAR */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 52px 16px 12px; flex-shrink: 0; }
  .logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; }
  .logo-dot { width: 26px; height: 26px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .logo-dot svg { width: 13px; height: 13px; fill: #000; }
  .track-count { font-size: 12px; color: var(--muted); background: var(--surface2); padding: 4px 10px; border-radius: 20px; }

  /* NOW PLAYING */
  .np-card { margin: 0 16px 14px; background: var(--surface); border-radius: 16px; padding: 16px; border: 1px solid var(--border); flex-shrink: 0; }
  .np-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.8px; color: var(--green); font-weight: 600; margin-bottom: 12px; }
  .np-row { display: flex; align-items: center; gap: 12px; }
  .np-icon { width: 52px; height: 52px; border-radius: 8px; background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .np-info { flex: 1; min-width: 0; }
  .np-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-artist { font-size: 13px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-album { font-size: 11px; color: #555; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .play-btn { width: 44px; height: 44px; background: var(--green); border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.1s; }
  .play-btn:active { transform: scale(0.92); }
  .play-btn svg { fill: #000; width: 20px; height: 20px; margin-left: 2px; }

  /* CONTROLS */
  .controls { display: flex; gap: 8px; padding: 0 16px; margin-bottom: 12px; flex-shrink: 0; }
  .c-btn { flex: 1; background: var(--surface); color: var(--text); font-size: 13px; font-weight: 500; padding: 12px 6px; border: 1px solid var(--border); border-radius: 50px; cursor: pointer; transition: background 0.1s; }
  .c-btn:active { background: var(--surface2); }
  .c-btn.green { background: var(--green); color: #000; font-weight: 700; border-color: var(--green); }
  .c-btn.green:active { background: var(--green-dark); }

  /* PROGRESS */
  .prog-row { display: flex; align-items: center; gap: 10px; padding: 0 16px; margin-bottom: 14px; flex-shrink: 0; }
  .prog-track { flex: 1; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .prog-bar { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
  .prog-lbl { font-size: 11px; color: var(--muted); flex-shrink: 0; white-space: nowrap; }

  /* SEARCH */
  .search-row { padding: 0 16px; margin-bottom: 10px; flex-shrink: 0; }
  .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 9px 14px; font-size: 13px; color: var(--text); outline: none; }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--green); }

  /* QUEUE */
  .q-hd { display: flex; justify-content: space-between; align-items: center; padding: 0 16px; margin-bottom: 6px; flex-shrink: 0; }
  .q-hd-l { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; color: var(--muted); }
  .q-hd-r { font-size: 12px; color: #444; }
  .q-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 8px 32px; }
  .q-item { display: flex; align-items: center; gap: 10px; padding: 8px 8px; border-radius: 8px; cursor: pointer; }
  .q-item:active { background: var(--surface); }
  .q-item.cur { background: var(--surface); }
  .q-num { font-size: 11px; color: #444; width: 28px; text-align: right; flex-shrink: 0; }
  .q-icon { width: 36px; height: 36px; border-radius: 4px; background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--muted); }
  .q-info { flex: 1; min-width: 0; }
  .q-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .q-artist { font-size: 12px; color: var(--muted); }
  .q-open { font-size: 13px; color: #444; text-decoration: none; padding: 6px 4px; flex-shrink: 0; }

  /* TOAST */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(6px); background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: #fff; font-size: 13px; padding: 9px 18px; border-radius: 50px; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 99; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); }
  .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* SEARCH MODE */
  .search-results { display: none; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 8px 32px; }
  .search-results.active { display: block; }
  .q-list.hidden { display: none; }
  .q-hd.hidden { display: none; }
</style>
</head>

  <div class="prog-row">

    <div class="prog-lbl" id="prog-lbl"></div>
  </div>

  <div class="search-row">

  <div class="q-hd" id="q-hd">

  </div>
  <div class="q-list" id="q-list"></div>
  <div class="search-results" id="search-results"></div>
</div>

uri": "spotify:track:0uP15QSJzK4Yyn1oAjsZsV", "name": "Fix Up, Look Sharp", "artist": "Dizzee Rascal", "album": "Boy In Da Corner"}, {"uri": "spotify:track:653rxW1E7V52QWh6a7oIdS", "name": "My My My", "artist": "Armand Van Helden", "album": "Nympho"}, {"uri": "spotify:track:7BpyfQEmvi0sUmOq29plEE", "name": "You Don't Know Me (feat. Duane Harden) - Radio Edit", "artist": "Armand Van Helden;Duane Harden", "album": "You Don't Know Me (feat. Duane Harden)"}, {"uri": "spotify:track:2WlEuHXJjUJeMGUdK3f6Ny", "name": "Peanut Butter Jelly", "artist": "Galantis", "album": "Pharmacy"}, {"uri": "spotify:track:5AyL2kgLtTWEu3qO3B9SqK", "name": "Like A G6", "artist": "Far East Movement;The Cataracs;DEV", "album": "Free Wired"}, {"uri": "spotify:track:7sImc1IHpucOTKCUdIQkHW", "name": "Day 'N' Nite - Crookers Remix", "artist": "Kid Cudi;Crookers", "album": "MTV Summer Jams"}, {"uri": "spotify:track:5EJcVJZBl6HTfSf6z4dC78", "name": "One (Your Name)", "artist": "Swedish House Mafia;Pharrell Williams", "album": "Until Now"}, {"uri": "spotify:track:0PtLVOQpx5YxQ33U0XxSdB", "name": "Hello", "artist": "Martin Solveig;Dragonette", "album": "Clubland 18"}, {"uri": "spotify:track:3kWHCjPkAP5x9ZEs6SlXk9", "name": "Jack - Radio Edit", "artist": "Breach", "album": "Jack"}];

let tracks = [], idx = 0;

function fy(a) {
  const arr = [...a];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function reshuffle() {
  tracks = fy(ALL_TRACKS);
  idx = 0;
  document.getElementById('search').value = '';
  hideSearch();
  render();
  toast('Reshuffled all ' + tracks.length + ' songs!');
}

function render() {
  const t = tracks[idx]; if (!t) return;
  document.getElementById('np-name').textContent = t.name;
  document.getElementById('np-artist').textContent = t.artist;
  document.getElementById('np-album').textContent = t.album;
  document.getElementById('np-icon').textContent = getEmoji(t.artist);
  const pct = tracks.length > 1 ? idx / (tracks.length - 1) * 100 : 0;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-lbl').textContent = (idx + 1) + ' / ' + tracks.length;
  document.getElementById('q-count').textContent = (tracks.length - idx - 1) + ' remaining';
  renderQueue();
}

function renderQueue() {
  const list = document.getElementById('q-list');
  list.innerHTML = '';
  const end = Math.min(tracks.length, idx + 60);
  for (let i = idx; i < end; i++) {
    const tr = tracks[i];
    const el = document.createElement('div');
    el.className = 'q-item' + (i === idx ? ' cur' : '');
    el.innerHTML =
      '<div class="q-num">' + (i + 1) + '</div>' +
      '<div class="q-icon">' + getEmoji(tr.artist) + '</div>' +
      '<div class="q-info"><div class="q-name">' + esc(tr.name) + '</div>' +
      '<div class="q-artist">' + esc(tr.artist) + '</div></div>' +
      '<a class="q-open" href="' + tr.uri + '">▶</a>';
    el.addEventListener('click', function(e) {
      if (e.target.tagName === 'A') return;
      idx = i; render();
    });
    list.appendChild(el);
  }
}

function onSearch(q) {
  if (!q.trim()) { hideSearch(); return; }
  const results = document.getElementById('search-results');
  const qlist = document.getElementById('q-list');
  const qhd = document.getElementById('q-hd');
  qlist.classList.add('hidden');
  qhd.classList.add('hidden');
  results.classList.add('active');
  results.innerHTML = '';
  const lower = q.toLowerCase();
  const matches = ALL_TRACKS.filter(t =>
    t.name.toLowerCase().includes(lower) || t.artist.toLowerCase().includes(lower)
  ).slice(0, 50);
  if (matches.length === 0) {
    results.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted)">No results</div>';
    return;
  }
  matches.forEach(tr => {
    const el = document.createElement('div');
    el.className = 'q-item';
    el.innerHTML =
      '<div class="q-icon">' + getEmoji(tr.artist) + '</div>' +
      '<div class="q-info"><div class="q-name">' + esc(tr.name) + '</div>' +
      '<div class="q-artist">' + esc(tr.artist) + '</div></div>' +
      '<a class="q-open" href="' + tr.uri + '">▶</a>';
    el.addEventListener('click', function(e) {
      if (e.target.tagName === 'A') return;
      // Jump to this track in the queue
      const i = tracks.findIndex(t => t.uri === tr.uri);
      if (i >= 0) { idx = i; } else { tracks.unshift(tr); idx = 0; }
      document.getElementById('search').value = '';
      hideSearch();
      render();
    });
    results.appendChild(el);
  });
}

function hideSearch() {
  document.getElementById('search-results').classList.remove('active');
  document.getElementById('q-list').classList.remove('hidden');
  document.getElementById('q-hd').classList.remove('hidden');
}

function next() {
  if (idx < tracks.length - 1) { idx++; render(); }
  else toast('End of playlist — tap Reshuffle');
}

function prev() { if (idx > 0) { idx--; render(); } }

function openCurrent() {
  const t = tracks[idx];
  if (t) window.open(t.uri);
}

function getEmoji(artist) {
  const emojis = ['🎸','🎹','🥁','🎺','🎻','🎤','🎧','🎵','🎶','🎼'];
  let h = 0;
  for (let c of artist) h = (h * 31 + c.charCodeAt(0)) & 0xfffffff;
  return emojis[h % emojis.length];
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(toast.t); toast.t = setTimeout(() => el.classList.remove('on'), 2500);
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Start
reshuffle();
</script>
